<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Madness</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; }
        h1 { text-align: center; color: #ffcc00; }
        .bracket-outer { display: flex; padding: 20px; overflow-x: auto; background: #1a1a1a; border-radius: 10px; }
        .round { display: flex; flex-direction: column; width: 200px; margin-right: 40px; flex-shrink: 0; }
        .matchup { display: flex; flex-direction: column; margin: 10px 0; justify-content: center; min-height: 80px; }
        /* Dynamic spacing for rounds */
        .round:nth-child(2) .matchup { min-height: 160px; }
        .round:nth-child(3) .matchup { min-height: 320px; }
        .round:nth-child(4) .matchup { min-height: 640px; }
        button { background: #333; color: white; border: 1px solid #444; padding: 8px; margin: 2px 0; cursor: pointer; width: 100%; text-align: left; border-radius: 4px; }
        button:hover { border-color: #ffcc00; }
        .seed { color: #ffcc00; font-weight: bold; margin-right: 5px; }
        .controls { text-align: center; margin: 20px auto; padding: 20px; background: #1a1a1a; max-width: 500px; border-radius: 10px; }
        input { padding: 10px; width: 70%; margin-bottom: 10px; }
        table { width: 100%; max-width: 800px; margin: 20px auto; border-collapse: collapse; background: #1a1a1a; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { color: #ffcc00; background: #222; }
    </style>
</head>
<body>

    <div id="bracket" class="bracket-outer"></div>

        <input type="text" id="userName" placeholder="Bracket Name...">
        <br>
        <button style="width: auto; background: #ffcc00; color: black; font-weight: bold; padding: 10px 20px;" onclick="submitBracket()">Submit Bracket</button>

    </table>

// 2. RENDER BRACKET
function draw() {
    const container = document.getElementById("bracket");
    container.innerHTML = "";
    userBracket.forEach((round, rIdx) => {
        const div = document.createElement("div");
        div.className = "round";
        div.innerHTML = `<h3>Round ${rIdx+1}</h3>`;
        round.forEach((m, mIdx) => {
            const mDiv = document.createElement("div");
            mDiv.className = "matchup";
            m.forEach((team, tIdx) => {
                const b = document.createElement("button");
                b.innerHTML = team ? `<span class="seed">${team.seed}</span> ${team.name}` : "TBD";
                b.onclick = () => {
                    if (!team) return;
                    if (!userBracket[rIdx+1]) userBracket[rIdx+1] = [];
                    const nextM = Math.floor(mIdx/2);
                    if (!userBracket[rIdx+1][nextM]) userBracket[rIdx+1][nextM] = [null, null];
                    userBracket[rIdx+1][nextM][mIdx%2] = team;
                    if (rIdx === 5) document.getElementById("champion").innerText = "🏆 " + team.name;
                    draw();
                };
                mDiv.appendChild(b);
            });
            div.appendChild(mDiv);
        });
        container.appendChild(div);
    });
}
