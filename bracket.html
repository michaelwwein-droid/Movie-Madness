<!DOCTYPE html>
<html>
<head>
    <title>Movie Madness</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .bracket-outer { display: flex; overflow-x: auto; padding: 20px; background: #1a1a1a; }
        .round { flex: 0 0 200px; margin-right: 30px; display: flex; flex-direction: column; }
        .matchup { margin: 10px 0; display: flex; flex-direction: column; justify-content: center; min-height: 60px; }
        button { background: #333; color: white; border: 1px solid #444; padding: 10px; margin: 2px 0; cursor: pointer; text-align: left; }
        .round:nth-child(2) .matchup { min-index: 120px; margin: 40px 0; }
        table { width: 80%; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; }
    </style>
</head>
<body>

    <h1>🎬 MOVIE MADNESS</h1>

    <div id="bracket-container" class="bracket-outer"></div>

    <div style="margin: 20px;">
        <h2 id="champ-name">Pick Your Winner</h2>
        <input type="text" id="u-name" placeholder="Your Name" style="padding: 10px;">
        <button onclick="sendIt()" style="background: #ffcc00; color: black; font-weight: bold;">SUBMIT</button>
    </div>

    <table>
        <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
        <tbody id="l-body"><tr><td colspan="3">Waiting for Sheets...</td></tr></tbody>
    </table>

<script>
// --- DATA ---
const movies = [
    "Shawshank", "Airplane!", "Social Network", "Die Hard", "Fight Club", "Eternal Sunshine", "Interstellar", "Mr. Smith",
    "Few Good Men", "Trading Places", "Matrix", "Beautiful Mind", "Shining", "Shutter Island", "Goodfellas", "Willy Wonka",
    "Godfather", "Groundhog Day", "Strangelove", "Truman Show", "2001", "Wonderful Life", "12 Angry Men", "Best in Show",
    "Budapest Hotel", "Full Metal Jacket", "Back to the Future", "Major League", "Jaws", "Train Dreams", "Star Wars", "Casablanca",
    "Dark Knight", "Monty Python", "Dead Poets", "Coming to America", "Ferris Bueller", "League of Their Own", "Raiders", "Moonrise Kingdom",
    "Breakfast Club", "Cool Hand Luke", "Whiplash", "Harry Potter", "Karate Kid", "National Lampoon", "Good Will Hunting", "Spinal Tap",
    "Pulp Fiction", "Caddyshack", "Ghostbusters", "Infinity War", "La La Land", "Catch Me", "Princess Bride", "Field of Dreams",
    "Inception", "Rounders", "Usual Suspects", "WarGames", "Spider-Verse", "Cuckoo's Nest", "Se7en", "Stranger Than Fiction"
];

let myData = [[]];
// Setup Round 1
for (let i = 0; i < movies.length; i += 2) {
    myData[0].push([movies[i], movies[i+1]]);
}

// --- DRAW ---
function draw() {
    const cont = document.getElementById("bracket-container");
    cont.innerHTML = "";
    myData.forEach((round, rIdx) => {
        const rDiv = document.createElement("div");
        rDiv.className = "round";
        rDiv.innerHTML = `<h3>Round ${rIdx+1}</h3>`;
        round.forEach((m, mIdx) => {
            const mDiv = document.createElement("div");
            mDiv.className = "matchup";
            m.forEach((team, tIdx) => {
                const b = document.createElement("button");
                b.innerText = team || "TBD";
                b.onclick = () => {
                    if (!team) return;
                    if (!myData[rIdx+1]) myData[rIdx+1] = [];
                    const nextM = Math.floor(mIdx/2);
                    if (!myData[rIdx+1][nextM]) myData[rIdx+1][nextM] = [null, null];
                    myData[rIdx+1][nextM][mIdx%2] = team;
                    if (rIdx === 5) document.getElementById("champ-name").innerText = "🏆 " + team;
                    draw();
                };
                mDiv.appendChild(b);
            });
            rDiv.appendChild(mDiv);
        });
        cont.appendChild(rDiv);
    });
}

// --- GOOGLE ---
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSg1nKqcsoXSWAjnhLTXkBOw9p9hdqYn_fEbVnFQBb7Cqa6LetUvdfLdnoNAXYLDkEMjps_GtPAKDWG/pub?gid=324817627&single=true&output=csv';

async function getScores() {
    try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(sheetURL)}&t=${Date.now()}`);
        const json = await res.json();
        const rows = json.contents.split("\n").filter(r => r.trim() !== "");
        const body = document.getElementById("l-body");
        body.innerHTML = "";
        
        if (rows.length <= 1) {
            body.innerHTML = "<tr><td colspan='3'>No entries found yet.</td></tr>";
            return;
        }

        rows.slice(1).forEach((r, i) => {
            const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            // Index [2] is Column C. Change to [1] if your names are in Column B.
            let name = cols[2] ? cols[2].replace(/"/g, "") : "User";
            body.innerHTML += `<tr><td>${i+1}</td><td>${name}</td><td>0</td></tr>`;
        });
    } catch (e) { console.log(e); }
}

function sendIt() {
    const name = document.getElementById("u-name").value || "Anon";
    const form = new FormData();
    form.append("entry.674437929", name);
    form.append("entry.1121614126", JSON.stringify(myData));
    fetch("https://docs.google.com/forms/d/e/1FAIpQLSfTBnMkkUFIzn-OWvJ1JcQNzLGrmAPi6Mg_bsr-ODidwEz4rw/formResponse", { method: "POST", mode: "no-cors", body: form })
    .then(() => alert("Sent!"));
}

draw();
getScores();
</script>
</body>
</html>
