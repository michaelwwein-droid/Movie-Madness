<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Movie Society | Movie Madness</title>
    <style>
        /* --- THEME & LAYOUT --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h1, h2 {
            text-align: center;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- BRACKET GRAPHICS --- */
        .bracket-outer {
            display: flex;
            justify-content: flex-start;
            padding: 40px 20px;
            overflow-x: auto;
            gap: 40px;
            min-height: 600px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 240px;
            flex-shrink: 0;
        }

        .matchup {
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 10px 0;
            padding: 10px 0;
            justify-content: center;
        }

        /* Connecting Lines */
        .matchup::after {
            content: "";
            position: absolute;
            right: -22px;
            top: 50%;
            width: 20px;
            height: 50%;
            border: 2px solid #444;
            border-left: none;
        }

        .matchup:nth-child(odd)::after {
            border-bottom: none;
            border-radius: 0 8px 0 0;
            top: 50%;
        }

        .matchup:nth-child(even)::after {
            border-top: none;
            border-radius: 0 0 8px 0;
            top: 0;
        }

        .round:last-child .matchup::after { display: none; }

        .matchup button {
            display: flex;
            align-items: center;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            margin: 3px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: left;
            transition: 0.2s;
            z-index: 2;
        }

        .matchup button:hover { border-color: #ffcc00; background: #333; }

        .seed {
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 2px;
            margin-right: 8px;
            min-width: 18px;
            text-align: center;
        }

        /* --- CONTROLS & CHAMPION --- */
        .controls {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 600px;
            margin: 40px auto;
        }

        .champion-area {
            border: 2px gold dashed;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            background: rgba(255, 204, 0, 0.05);
        }

        #champion {
            font-size: 1.8rem;
            color: #ffcc00;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 12px;
            width: 60%;
            border-radius: 4px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            margin-bottom: 15px;
        }

        button.primary {
            background: #ffcc00;
            color: black;
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* --- LEADERBOARD --- */
        table {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-collapse: collapse;
            background: #1a1a1a;
        }

        th { background: #333; color: #ffcc00; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #2a2a2a; text-align: center; }
    </style>
</head>
<body>

    <h1>🎬 Movie Madness</h1>
    <p style="text-align: center; color: #888;">Presented by Dead Movie Society</p>

    <div class="bracket-outer" id="bracket"></div>

    <div class="controls">
        <div class="champion-area">
            <h2>🏆 THE WINNER'S CIRCLE 🏆</h2>
            <div id="champion">Select Your Winners Above</div>
        </div>
        
        <input type="text" id="name" placeholder="Enter Your Bracket Name">
        <button class="primary" onclick="submitForm()">Submit My Bracket</button>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">Don't forget to vote on @deadmoviesociety's stories!</p>
    </div>

    <div class="leaderboard-section">
        <h2>Live Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                    <th>Correct</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
</body>

</html>
