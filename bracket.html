<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Movie Society | Movie Madness</title>
    <style>
        /* --- THEME & LAYOUT --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        /* --- BRACKET GRAPHICS --- */
        .bracket-outer {
            display: flex;
            justify-content: flex-start;
            padding: 40px 20px;
            overflow-x: auto;
            gap: 40px;
            min-height: 800px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 240px;
            flex-shrink: 0;
        }

        .round h3 {
            text-align: center;
            font-size: 0.9rem;
            color: #ffcc00;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .matchup {
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 10px 0;
            padding: 10px 0;
            justify-content: center;
        }

        /* Connector Lines */
        .matchup::after {
            content: "";
            position: absolute;
            right: -22px;
            top: 50%;
            width: 20px;
            height: 50%;
            border: 2px solid #444;
            border-left: none;
        }

        .matchup:nth-child(odd)::after {
            border-bottom: none;
            border-radius: 0 8px 0 0;
            top: 50%;
        }

        .matchup:nth-child(even)::after {
            border-top: none;
            border-radius: 0 0 8px 0;
            top: 0;
        }

        .round:last-child .matchup::after { display: none; }

        /* BUTTONS */
        .matchup button {
            display: flex;
            align-items: center;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: left;
            transition: 0.2s;
            z-index: 2;
        }

        .matchup button:hover {
            border-color: #ffcc00;
            background: #333;
        }

        .seed {
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 2px;
            margin-right: 8px;
            min-width: 18px;
            text-align: center;
        }

        /* --- CONTROLS --- */
        .controls {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 600px;
            margin: 40px auto;
        }

        #champion {
            font-size: 2rem;
            color: #ffcc00;
            font-weight: bold;
            margin: 20px 0;
            min-height: 40px;
        }

        input[type="text"] {
            padding: 12px;
            width: 70%;
            border-radius: 4px;
            border: 1px solid #444;
            background: #222;
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: #ffcc00;
            color: black;
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- LEADERBOARD --- */
        .leaderboard-section {
            max-width: 800px;
            margin: 50px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }

        th { background: #333; color: #ffcc00; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #2a2a2a; text-align: center; }
    </style>
</head>
<body>

    <h1>🎬 Movie Madness</h1>
    <p class="subtitle">Presented by Dead Movie Society</p>

    <div class="bracket-outer" id="bracket"></div>

    <div class="controls">
        <h2>🏆 THE WINNER'S CIRCLE</h2>
        <div id="champion">Select Your Winners</div>
        <input type="text" id="name" placeholder="Enter Your Bracket Name">
        <br>
        <button class="btn-primary" onclick="submitForm()">Submit My Bracket</button>
    </div>

    <div class="leaderboard-section">
        <h2>Live Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                    <th>Correct</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // --- DATA ---
        const initialMovies = [
            { seed: 1, name: "The Shawshank Redemption" }, { seed: 16, name: "Airplane!" },
            { seed: 8, name: "The Social Network" }, { seed: 9, name: "Die Hard" },
            { seed: 5, name: "Fight Club" }, { seed: 12, name: "Eternal Sunshine" },
            { seed: 4, name: "Interstellar" }, { seed: 13, name: "Mr. Smith Goes to Washington" },
            { seed: 6, name: "A Few Good Men" }, { seed: 11, name: "Trading Places" },
            { seed: 3, name: "The Matrix" }, { seed: 14, name: "A Beautiful Mind" },
            { seed: 7, name: "The Shining" }, { seed: 10, name: "Shutter Island" },
            { seed: 2, name: "Goodfellas" }, { seed: 15, name: "Willy Wonka" },
            { seed: 1, name: "The Godfather" }, { seed: 16, name: "Groundhog Day" },
            { seed: 8, name: "Dr. Strangelove" }, { seed: 9, name: "The Truman Show" },
            { seed: 5, name: "2001: A Space Odyssey" }, { seed: 12, name: "It’s a Wonderful Life" },
            { seed: 4, name: "Cuckoo’s Nest" }, { seed: 13, name: "Best in Show" },
            { seed: 6, name: "Grand Budapest Hotel" }, { seed: 11, name: "Full Metal Jacket" },
            { seed: 3, name: "Back to the Future" }, { seed: 14, name: "Major League" },
            { seed: 7, name: "Jaws" }, { seed: 10, name: "Train Dreams" },
            { seed: 2, name: "Star Wars: A New Hope" }, { seed: 15, name: "Casablanca" },
            { seed: 1, name: "The Dark Knight" }, { seed: 16, name: "Monty Python" },
            { seed: 8, name: "Dead Poets Society" }, { seed: 9, name: "Coming to America" },
            { seed: 5, name: "Ferris Bueller" }, { seed: 12, name: "A League of Their Own" },
            { seed: 4, name: "Raiders of the Lost Ark" }, { seed: 13, name: "Moonrise Kingdom" },
            { seed: 6, name: "The Breakfast Club" }, { seed: 11, name: "Cool Hand Luke" },
            { seed: 3, name: "Whiplash" }, { seed: 14, name: "Harry Potter 8" },
            { seed: 7, name: "The Karate Kid" }, { seed: 10, name: "National Lampoon" },
            { seed: 2, name: "Good Will Hunting" }, { seed: 15, name: "This Is Spinal Tap" },
            { seed: 1, name: "Pulp Fiction" }, { seed: 16, name: "Caddyshack" },
            { seed: 8, name: "Ghostbusters" }, { seed: 9, name: "Avengers: Infinity War" },
            { seed: 5, name: "La La Land" }, { seed: 12, name: "Catch Me If You Can" },
            { seed: 4, name: "The Princess Bride" }, { seed: 13, name: "Field of Dreams" },
            { seed: 6, name: "Inception" }, { seed: 11, name: "Rounders" },
            { seed: 3, name: "The Usual Suspects" }, { seed: 14, name: "WarGames" },
            { seed: 7, name: "Spider-Verse" }, { seed: 10, name: "Cuckoo's Nest" },
            { seed: 2, name: "Se7en" }, { seed: 15, name: "Stranger Than Fiction" }
        ];

        let rounds = [[]];
        for (let i = 0; i < initialMovies.length; i += 2) {
            rounds[0].push([initialMovies[i], initialMovies[i + 1]]);
        }

        // --- RENDER ---
        function renderBracket() {
            const bracketDiv = document.getElementById("bracket");
            bracketDiv.innerHTML = "";
            rounds.forEach((round, i) => {
                const roundDiv = document.createElement("div");
                roundDiv.className = "round";
                roundDiv.innerHTML = `<h3>Round ${i + 1}</h3>`;
                round.forEach((matchup, j) => {
                    const matchDiv = document.createElement("div");
                    matchDiv.className = "matchup";
                    matchup.forEach((movie, k) => {
                        const btn = document.createElement("button");
                        if (movie) {
                            btn.innerHTML = `<span class="seed">${movie.seed}</span> ${movie.name}`;
                            btn.onclick = () => selectWinner(i, j, k);
                        } else {
                            btn.innerHTML = `<span class="seed">?</span> <i>TBD</i>`;
                            btn.style.opacity = "0.3";
                        }
                        matchDiv.appendChild(btn);
                    });
                    roundDiv.appendChild(matchDiv);
                });
                bracketDiv.appendChild(roundDiv);
            });
        }

        function selectWinner(roundIndex, matchIndex, choiceIndex) {
            const winner = rounds[roundIndex][matchIndex][choiceIndex];
            if (rounds.length <= roundIndex + 1) rounds.push([]);
            const nextMatchIdx = Math.floor(matchIndex / 2);
            if (!rounds[roundIndex + 1][nextMatchIdx]) rounds[roundIndex + 1][nextMatchIdx] = [null, null];
            rounds[roundIndex + 1][nextMatchIdx][matchIndex % 2] = winner;
            renderBracket();
            const lastRound = rounds[rounds.length - 1];
            if (lastRound.length === 1 && lastRound[0][0]) {
                document.getElementById("champion").innerText = `🏆 ${lastRound[0][0].name}`;
            }
        }

        function submitForm() {
            const name = document.getElementById("name").value || "Anonymous";
            const data = JSON.stringify(rounds.map((round, r) => ({ round: r + 1, matchups: round })));
            const formData = new FormData();
            formData.append("entry.674437929", name);
            formData.append("entry.1121614126", data);
            fetch("https://docs.google.com/forms/d/e/1FAIpQLSfTBnMkkUFIzn-OWvJ1JcQNzLGrmAPi6Mg_bsr-ODidwEz4rw/formResponse", { method: "POST", mode: "no-cors", body: formData })
            .then(() => alert("Bracket Submitted!"))
            .catch(() => alert("Submission Error"));
        }

        // --- LEADERBOARD LOGIC ---
        async function updateLeaderboard() {
            try {
                const [offRes, userRes] = await Promise.all([
                    fetch('official_bracket.json'),
                    fetch('https://sheetdb.io/api/v1/zdvrwyp85u49u')
                ]);
                const official = await offRes.json();
                const rawUsers = await userRes.json();

                const users = rawUsers.map(u => ({
                    name: u.Name || "Anonymous",
                    rounds: JSON.parse(u["Bracket Data"] || "[]")
                }));

                const scores = calculateScores(users, official);
                const tbody = document.querySelector("#leaderboard tbody");
                tbody.innerHTML = "";
                scores.forEach((user, i) => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td>${i + 1}</td><td>${user.name}</td><td>${user.score}</td><td>${user.roundsCorrect}</td>`;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error("Leaderboard error", err); }
        }

        function calculateScores(users, official) {
            const scores = [];
            const norm = (s) => (s || "").toString().toLowerCase().replace(/^\d+\s*/, "").replace(/[^a-z0-9]/g, "").trim();
            users.forEach(user => {
                let s = 0, c = 0;
                official.forEach((round, rIdx) => {
                    if (!user.rounds[rIdx]) return;
                    round.matchups.forEach((m, mIdx) => {
                        const offW = m?.[0]?.name || m?.[0]?.[0]?.name;
                        const uPick = user.rounds[rIdx]?.matchups?.[mIdx]?.[0]?.name || user.rounds[rIdx]?.matchups?.[mIdx]?.name;
                        if (offW && uPick && norm(offW) === norm(uPick)) {
                            s += Math.pow(2, rIdx); c++;
                        }
                    });
                });
                scores.push({ name: user.name, score: s, roundsCorrect: c });
            });
            return scores.sort((a, b) => b.score - a.score);
        }

        renderBracket();
        updateLeaderboard();
        setInterval(updateLeaderboard, 60000);
    </script>
</body>
</html>
