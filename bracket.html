<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Movie Society | Movie Madness</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; color: #ffcc00; text-transform: uppercase; }

        /* The Container */
        .bracket-outer {
            display: flex;
            gap: 40px;
            padding: 40px;
            overflow-x: auto;
            align-items: flex-start;
            min-height: 800px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 220px;
            flex-shrink: 0;
        }

        .matchup {
            position: relative;
            display: flex;
            flex-direction: column;
            margin: 20px 0;
            padding: 10px 0;
            flex-grow: 1;
            justify-content: center;
        }

        /* BUTTONS */
        .matchup button {
            display: flex;
            align-items: center;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            z-index: 2;
        }

        .matchup button:hover { border-color: #ffcc00; background: #333; }

        .seed { color: #ffcc00; font-weight: bold; margin-right: 10px; width: 20px; }

        /* LINES */
        .matchup::after {
            content: "";
            position: absolute;
            right: -22px;
            width: 20px;
            border: 2px solid #444;
            border-left: none;
            z-index: 1;
        }

        .matchup:nth-child(odd)::after {
            height: 50%;
            top: 50%;
            border-bottom: none;
            border-radius: 0 10px 0 0;
        }

        .matchup:nth-child(even)::after {
            height: 50%;
            bottom: 50%;
            border-top: none;
            border-radius: 0 0 10px 0;
        }

        .round:last-child .matchup::after { display: none; }

        .controls {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            max-width: 600px;
            margin: 20px auto;
            border-radius: 12px;
            border: 1px solid #333;
        }

        #champion { font-size: 2rem; color: #ffcc00; font-weight: bold; margin: 20px 0; }
        
        input { padding: 10px; width: 60%; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; }
        
        .primary-btn { background: #ffcc00; color: black; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        table { width: 100%; max-width: 800px; margin: 40px auto; border-collapse: collapse; background: #1a1a1a; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background: #333; color: #ffcc00; }
    </style>
</head>
<body>

    <h1>🎬 Movie Madness</h1>

    <div class="bracket-outer" id="bracket"></div>

    <div class="controls">
        <div id="champion">Predict Your Winner</div>
        <input type="text" id="name" placeholder="Bracket Name">
        <button class="primary-btn" onclick="submitForm()">Submit Bracket</button>
    </div>

    <table id="leaderboard">
        <thead>
            <tr><th>Rank</th><th>Name</th><th>Score</th><th>Correct</th></tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
    // Test with 16 movies first to ensure the bracket appears!
    const initialMovies = [
        { seed: 1, name: "The Shawshank Redemption" }, { seed: 16, name: "Airplane!" },
        { seed: 8, name: "The Social Network" }, { seed: 9, name: "Die Hard" },
        { seed: 5, name: "Fight Club" }, { seed: 12, name: "Eternal Sunshine" },
        { seed: 4, name: "Interstellar" }, { seed: 13, name: "Mr. Smith Goes to Washington" },
        { seed: 6, name: "A Few Good Men" }, { seed: 11, name: "Trading Places" },
        { seed: 3, name: "The Matrix" }, { seed: 14, name: "A Beautiful Mind" },
        { seed: 7, name: "The Shining" }, { seed: 10, name: "Shutter Island" },
        { seed: 2, name: "Goodfellas" }, { seed: 15, name: "Willy Wonka" }
    ];

    let rounds = [[]];
    for (let i = 0; i < initialMovies.length; i += 2) {
        rounds[0].push([initialMovies[i], initialMovies[i + 1]]);
    }

    function renderBracket() {
        const bracketDiv = document.getElementById("bracket");
        bracketDiv.innerHTML = "";

        rounds.forEach((round, i) => {
            const roundDiv = document.createElement("div");
            roundDiv.className = "round";
            roundDiv.innerHTML = `<h3>Round ${i + 1}</h3>`;

            round.forEach((matchup, j) => {
                const matchDiv = document.createElement("div");
                matchDiv.className = "matchup";

                matchup.forEach((movie, k) => {
                    const btn = document.createElement("button");
                    if (movie) {
                        btn.innerHTML = `<span class="seed">${movie.seed}</span> ${movie.name}`;
                        btn.onclick = () => selectWinner(i, j, k);
                    } else {
                        btn.innerHTML = `<span class="seed">?</span> <i>TBD</i>`;
                        btn.style.opacity = "0.3";
                    }
                    matchDiv.appendChild(btn);
                });
                roundDiv.appendChild(matchDiv);
            });
            bracketDiv.appendChild(roundDiv);
        });
    }

    function selectWinner(roundIndex, matchIndex, choiceIndex) {
        const winner = rounds[roundIndex][matchIndex][choiceIndex];
        if (rounds.length <= roundIndex + 1) rounds.push([]);

        const nextMatchIndex = Math.floor(matchIndex / 2);
        if (!rounds[roundIndex + 1][nextMatchIndex]) {
            rounds[roundIndex + 1][nextMatchIndex] = [null, null];
        }

        rounds[roundIndex + 1][nextMatchIndex][matchIndex % 2] = winner;
        renderBracket();

        const lastRound = rounds[rounds.length - 1];
        if (lastRound.length === 1 && lastRound[0][0]) {
            document.getElementById("champion").innerText = "🏆 " + lastRound[0][0].name;
        }
    }

    function submitForm() {
        const name = document.getElementById("name").value || "Anonymous";
        const data = JSON.stringify(rounds);
        alert("Submitting as: " + name);
        // Add your fetch logic here
    }

    // Run on load
    renderBracket();

</script>
</body>
</html>
